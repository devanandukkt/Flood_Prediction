<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction System</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:80px;">

<h1>🌧️ Flood Prediction System</h1>

<form action="/predict" method="get">
    <input 
        type="text" 
        name="city" 
        placeholder="Enter city name"
        required
        style="padding:10px; width:250px; border-radius:6px;"
    >

    <br><br>

    <button 
        type="submit"
        style="padding:10px 20px; background:#007BFF; color:white; border:none; border-radius:6px;"
    >
        Predict Flood
    </button>
</form>

</body>
</html>
