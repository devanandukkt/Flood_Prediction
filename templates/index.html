<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction</title>
</head>

<body style="text-align:center; margin-top:50px; font-family:Arial;">
    <h1>🌧️ Flood Prediction System</h1>

    <form action="/predict" method="get">
        <input type="text" name="city" placeholder="Enter city name" required
               style="padding:10px; width:250px; border-radius:5px;">
        <br><br>

        <button type="submit"
                style="padding:10px 20px; background:#007BFF; color:white; border:none; border-radius:5px;">
            Predict Flood
        </button>
    </form>
</body>
</html>
